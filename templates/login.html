<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema Escolar</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      font-family: 'Poppins', sans-serif;
    }

    body{
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #09173D, #14285f);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .background-circles{
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }

    .circle{
      position: absolute;
      border-radius: 50%;
      background: rgba(193, 207, 246, 0.08);
      animation: float 8s infinite ease-in-out;
    }

    .circle:nth-child(1){
      width: 250px;
      height: 250px;
      top: -80px;
      left: -50px;
    }

    .circle:nth-child(2){
      width: 180px;
      height: 180px;
      bottom: -50px;
      right: 40px;
      animation-delay: 2s;
    }

    .circle:nth-child(3){
      width: 120px;
      height: 120px;
      top: 40%;
      left: 75%;
      animation-delay: 4s;
    }

    @keyframes float{
      0%,100%{
        transform: translateY(0px);
      }
      50%{
        transform: translateY(-20px);
      }
    }

    .login-card{
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 430px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 25px;
      padding: 45px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.35);
    }

    .login-title{
      color: #C1CFF6;
      font-size: 32px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 10px;
    }

    .login-subtitle{
      text-align: center;
      color: #99B0F0;
      margin-bottom: 35px;
      font-size: 14px;
    }

    .form-label{
      color: #C1CFF6;
      font-weight: 500;
    }

    .form-control{
      background-color: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: white;
      height: 50px;
      border-radius: 12px;
    }

    .form-control:focus{
      background-color: rgba(255,255,255,0.12);
      color: white;
      border-color: #99B0F0;
      box-shadow: 0 0 0 0.2rem rgba(153,176,240,0.25);
    }

    .form-control::placeholder{
      color: rgba(255,255,255,0.6);
    }

    .btn-login{
      width: 100%;
      height: 50px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #99B0F0, #C1CFF6);
      color: #09173D;
      font-weight: 700;
      font-size: 16px;
      transition: 0.3s ease;
      margin-top: 15px;
    }

    .btn-login:hover{
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(153,176,240,0.35);
    }

    .school-logo{
      width: 90px;
      height: 90px;
      background: rgba(255,255,255,0.08);
      border-radius: 50%;
      margin: 0 auto 20px auto;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #C1CFF6;
      font-size: 35px;
      font-weight: bold;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .alert{
      border-radius: 12px;
      margin-top: 20px;
    }

  </style>

</head>

<body>

  <div class="background-circles">
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
  </div>

  <div class="login-card">

    <div class="school-logo">
      🎓
    </div>

    <h1 class="login-title">
      Sistema Escolar
    </h1>

    <p class="login-subtitle">
      Plataforma institucional académica
    </p>

    <form method="POST">

      {% csrf_token %}

      <div class="mb-3">

        <label class="form-label">
          Cédula
        </label>

        <input 
          type="text" 
          name="cedula" 
          class="form-control"
          placeholder="Ingrese su cédula"
        >

      </div>

      <div class="mb-3">

        <label class="form-label">
          Contraseña
        </label>

        <input 
          type="password" 
          name="password" 
          class="form-control"
          placeholder="Ingrese su contraseña"
        >

      </div>

      <button type="submit" class="btn-login">
        Ingresar
      </button>

    </form>

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-danger">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}

  </div>

</body>
</html>
