<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Crear Horario</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card p-4 shadow">

        <h3 class="mb-4">➕ Crear Horario</h3>

        <form method="POST">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn btn-primary">
                Guardar
            </button>

            <a href="{% url 'panel_coordinador' %}" class="btn btn-secondary">
                Volver
            </a>

        </form>

    </div>

</div>

</body>

</html>
